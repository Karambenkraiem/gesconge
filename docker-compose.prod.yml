version: '3.8'

# Production compose file for the VPS.
# gesconge_backend and gesconge_frontend join the pre-existing external
# "proxy_net" network so the shared dataserv-nginx container can reach them
# by container name. No ports are published on the host — everything is
# routed through that shared nginx (see deploy/nginx-gesconge.conf).

services:
  postgres:
    image: postgres:16-alpine
    container_name: gesconge_postgres_prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - gesconge_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gesconge_backend_prod
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
      PORT: 3001
    volumes:
      - uploads:/app/uploads
    networks:
      - gesconge_internal
      - proxy_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: gesconge_frontend_prod
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    networks:
      - proxy_net

networks:
  gesconge_internal:
    driver: bridge
  proxy_net:
    external: true

volumes:
  postgres_data:
  uploads:
