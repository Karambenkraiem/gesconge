name: Build Android APK

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/build-android.yml'

permissions:
  contents: write

jobs:
  build-apk:
    name: Build debug APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Add Android platform
        working-directory: frontend
        run: npx cap add android

      - name: Sync Capacitor config
        working-directory: frontend
        run: npx cap sync android

      - name: Build debug APK
        working-directory: frontend/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Rename APK
        run: cp frontend/android/app/build/outputs/apk/debug/app-debug.apk gesconge.apk

      - name: Publish to "android-latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: GesConge Android (debug build)
          body: >
            Build automatique depuis ${{ github.sha }}.
            APK de debug pour installation directe (hors Play Store).
          files: gesconge.apk
