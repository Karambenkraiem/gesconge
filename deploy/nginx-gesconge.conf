# gesconge.alkaramsoft.ovh — snippet to paste into the shared nginx.conf
# (/opt/dataserv/ProjDataservComplet/nginx/nginx.conf on the VPS), inside the
# existing `http { ... }` block, right before its closing `}`.
#
# Insert this in TWO STEPS (see DEPLOYMENT.md) because the HTTPS block below
# references a certificate that does not exist yet on first deploy:
#   1. Paste only the first "HTTP → HTTPS redirect" server block, reload nginx,
#      then run certbot (webroot) to obtain the certificate.
#   2. Paste the second "HTTPS" server block, reload nginx again.
#
# gesconge_backend_prod and gesconge_frontend_prod are resolvable here because
# they are attached to the external "proxy_net" network, same as
# gtpp_frontend_prod / amsr_frontend_prod.

# ── GesConge — HTTP → HTTPS redirect ──
server {
    listen 80;
    server_name gesconge.alkaramsoft.ovh;

    location /.well-known/acme-challenge/ {
        root /etc/letsencrypt/webroot;
    }

    location / {
        return 301 https://gesconge.alkaramsoft.ovh$request_uri;
    }
}

# ── GesConge — HTTPS ──
server {
    listen 443 ssl;
    server_name gesconge.alkaramsoft.ovh;

    ssl_certificate     /etc/letsencrypt/live/gesconge.alkaramsoft.ovh/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gesconge.alkaramsoft.ovh/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    client_max_body_size 50M;

    # Stripped prefix: /api/conges -> gesconge_backend_prod:3001/conges
    location /api/ {
        proxy_pass         http://gesconge_backend_prod:3001/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location / {
        proxy_pass         http://gesconge_frontend_prod:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }
}
